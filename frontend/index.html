<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A chatbot that reads between the lines — intent classification, entity extraction, and a visible NLP pipeline." />
    <meta name="theme-color" content="#f8f4ec" />
    <meta property="og:title" content="LinguaBot — A chatbot that reads between the lines" />
    <meta property="og:description" content="Intent classification, entity extraction, and a visible NLP pipeline." />
    <meta property="og:type" content="website" />
    <title>LinguaBot</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('linguabot-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
